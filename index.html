<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anantha Shree Pro</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #2A0808; color: #e7e5e4; }
    .glass-card { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); }
    .bottom-sheet { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
    .sheet-open { transform: translateY(0); }
    .premium-input { width: 100%; background: rgba(0,0,0,0.3); border-bottom: 2px solid #D4AF37; padding: 16px; color: white; font-size: 16px; }
  </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

  <header class="p-5 border-b border-[#D4AF37]/20 flex justify-between items-center">
    <h1 class="text-xl font-bold text-[#D4AF37]">Anantha Shree</h1>
  </header>

  <main class="flex-1 overflow-y-auto px-5 pt-4 pb-[120px]" style="padding-bottom: max(120px, env(safe-area-inset-bottom));">
    <h2 class="text-center text-white py-4">Welcome Back, Ji</h2>
    <div class="glass-card p-6 rounded-3xl">
      <h3 class="text-xs uppercase text-[#D4AF37] mb-3">Quick Actions</h3>
      <button onclick="toggleBookingSheet(true)" class="w-full bg-[#D4AF37]/20 border border-[#D4AF37] text-[#D4AF37] py-4 rounded-xl font-bold">New Booking</button>
    </div>

    <!-- Booking Form -->
    <div id="booking-sheet" class="fixed inset-0 z-50 flex flex-col justify-end pointer-events-none">
      <div id="sheet-content" class="bottom-sheet w-full h-[80vh] bg-[#1a0a0a] rounded-t-[32px] p-6 pointer-events-auto border-t border-[#D4AF37]/30">
        <h2 class="text-2xl text-white mb-4">New Booking</h2>
        <input type="text" id="f-name" placeholder="Customer Name" class="premium-input rounded-xl mb-6">
        <button onclick="saveBookingToCloud()" class="w-full bg-[#D4AF37] text-black py-4 rounded-xl font-bold">Save</button>
      </div>
    </div>
  </main>

  <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass-card rounded-full h-20 px-6 flex items-center justify-between z-40">
    <div class="text-[#D4AF37] text-xs">Home</div>
    <button id="voice-mic-btn" onclick="startVoiceAssistant()" class="w-16 h-16 bg-teal-500 rounded-full text-white font-bold text-2xl shadow-lg">🎤</button>
    <div class="text-stone-500 text-xs">People</div>
  </nav>

  <script>
    // Firebase Config Integrated
    const firebaseConfig = { 
        apiKey: "AIzaSyCDzLnVOkLWSlbHi3nMzum2RsUOGT-529U", 
        authDomain: "ananthashree-ee68c.firebaseapp.com", 
        databaseURL: "https://ananthashree-ee68c-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "ananthashree-ee68c", 
        storageBucket: "ananthashree-ee68c.firebasestorage.app", 
        messagingSenderId: "554778775618", 
        appId: "1:554778775618:web:2f5fee9075dc45034adddb" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleBookingSheet(show) {
        document.getElementById('booking-sheet').classList.toggle('sheet-open', show);
    }

    function startVoiceAssistant() {
      if ('webkitSpeechRecognition' in window) {
        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'te-IN';
        recognition.start();
        recognition.onresult = (event) => {
          const text = event.results[0][0].transcript.toLowerCase();
          if (text.includes('booking') || text.includes('బుకింగ్')) {
            toggleBookingSheet(true);
            const speech = new SpeechSynthesisUtterance("Booking form opened");
            speech.lang = 'te-IN';
            window.speechSynthesis.speak(speech);
          }
        };
      }
    }

    function saveBookingToCloud() {
      const name = document.getElementById('f-name').value;
      if(name) {
          db.ref('bookings').push({ name: name, date: new Date().toISOString() });
          toggleBookingSheet(false);
          document.getElementById('f-name').value = '';
      }
    }
  </script>
</body>
</html>
