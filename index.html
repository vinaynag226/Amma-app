<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anantha Shree Pro</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #2A0808; color: #e7e5e4; }
    .glass-card { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); }
    .booking-sheet { position: fixed; bottom: 0; left: 0; width: 100%; height: 80vh; background: #1a0a0a; border-radius: 32px 32px 0 0; transform: translateY(100%); transition: transform 0.4s ease; z-index: 50; padding: 24px; border-top: 1px solid #D4AF37; }
    .sheet-open { transform: translateY(0); }
    .premium-input { width: 100%; background: rgba(0,0,0,0.3); border-bottom: 2px solid #D4AF37; padding: 16px; color: white; font-size: 16px; margin-bottom: 24px; }
    .app-screen { display: none; }
    .active-screen { display: block; }
  </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

  <header class="p-5 border-b border-[#D4AF37]/20">
    <h1 class="text-xl font-bold text-[#D4AF37]">Anantha Shree</h1>
  </header>

  <main class="flex-1 overflow-y-auto px-5 pt-4 pb-32" style="padding-bottom: max(120px, env(safe-area-inset-bottom));">
    
    <!-- Home Screen -->
    <div id="scr-home" class="app-screen active-screen space-y-4">
      <h2 class="text-center text-white py-4">Welcome Back, Ji</h2>
      <div class="glass-card p-6 rounded-3xl">
        <h3 class="text-xs uppercase text-[#D4AF37] mb-3">Today's Panchanga</h3>
        <div class="grid grid-cols-2 gap-2 text-sm">
          <div class="bg-black/20 p-3 rounded-lg"><span class="text-[#D4AF37]/60 block text-[9px]">Tithi</span><span id="ptithi">Ekadashi</span></div>
          <div class="bg-black/20 p-3 rounded-lg"><span class="text-[#D4AF37]/60 block text-[9px]">Nakshatra</span><span id="pnaksh">Rohini</span></div>
        </div>
      </div>
      <button onclick="toggleSheet(true)" class="w-full bg-[#D4AF37]/20 border border-[#D4AF37] text-[#D4AF37] py-4 rounded-xl font-bold">New Booking</button>
    </div>

    <!-- Tiffin Screen -->
    <div id="scr-tiffin" class="app-screen text-center pt-10 text-stone-500">Tiffin Module</div>
    <!-- Calendar Screen -->
    <div id="scr-calendar" class="app-screen text-center pt-10 text-stone-500">Calendar Module</div>
    <!-- People Screen -->
    <div id="scr-people" class="app-screen text-center pt-10 text-stone-500">People Module</div>

    <!-- Booking Form -->
    <div id="booking-sheet" class="booking-sheet">
      <h2 class="text-2xl text-white mb-4">New Booking</h2>
      <input type="text" id="f-name" placeholder="Customer Name" class="premium-input">
      <button onclick="saveBooking()" class="w-full bg-[#D4AF37] text-black py-4 rounded-xl font-bold">Save</button>
      <button onclick="toggleSheet(false)" class="w-full mt-4 text-stone-500 py-2">Close</button>
    </div>
  </main>

  <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass-card rounded-full h-20 px-6 flex items-center justify-between z-40">
    <button onclick="showScreen('scr-home')" class="text-[#D4AF37] text-xs">Home</button>
    <button onclick="showScreen('scr-calendar')" class="text-stone-500 text-xs">Dates</button>
    <button onclick="startVoice()" class="w-16 h-16 bg-teal-500 rounded-full text-white font-bold text-2xl shadow-lg">🎤</button>
    <button onclick="showScreen('scr-tiffin')" class="text-stone-500 text-xs">Tiffin</button>
    <button onclick="showScreen('scr-people')" class="text-stone-500 text-xs">People</button>
  </nav>

  <script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCDzLnVOkLWSlbHi3nMzum2RsUOGT-529U", 
        authDomain: "ananthashree-ee68c.firebaseapp.com", 
        databaseURL: "https://ananthashree-ee68c-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "ananthashree-ee68c", 
        storageBucket: "ananthashree-ee68c.firebasestorage.app", 
        messagingSenderId: "554778775618", 
        appId: "1:554778775618:web:2f5fee9075dc45034adddb" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showScreen(id) {
        document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
    }

    function toggleSheet(show) {
        document.getElementById('booking-sheet').classList.toggle('sheet-open', show);
    }

    function startVoice() {
      if ('webkitSpeechRecognition' in window) {
        const rec = new webkitSpeechRecognition();
        rec.lang = 'te-IN';
        rec.start();
        rec.onresult = (e) => {
          const text = e.results[0][0].transcript.toLowerCase();
          if (text.includes('booking') || text.includes('బుకింగ్')) {
            toggleSheet(true);
            const s = new SpeechSynthesisUtterance("Opening booking form");
            s.lang = 'te-IN';
            window.speechSynthesis.speak(s);
          } else if (text.includes('home') || text.includes('హోమ్')) {
            showScreen('scr-home');
          }
        };
      }
    }

    function saveBooking() {
      const name = document.getElementById('f-name').value;
      if(name) {
          db.ref('bookings').push({ name: name, date: new Date().toISOString() });
          toggleSheet(false);
          document.getElementById('f-name').value = '';
      }
    }
  </script>
</body>
</html>
